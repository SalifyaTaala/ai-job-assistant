<!DOCTYPE html>
<html>
<head>
    <title>AI Job Assistant</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; }
        textarea { width: 100%; height: 150px; margin-bottom: 15px; padding: 10px; }
        button { padding: 10px 20px; background: #333; color: white; border: none; cursor: pointer; }
        #output { margin-top: 20px; white-space: pre-wrap; background: #f5f5f5; padding: 15px; }
        #flagged { margin-top: 15px; background: #fff3cd; padding: 15px; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h1>AI Job Application Assistant</h1>

    <label>Your Resume:</label>
    <textarea id="resume" placeholder="Paste your resume text here..."></textarea>

    <label>Job Description:</label>
    <textarea id="job_description" placeholder="Paste the job posting here..."></textarea>

    <button onclick="generate()">Generate Cover Letter</button>

    <div id="output"></div>
    <div id="flagged"></div>

    <script>
        async function generate() {
            const resume = document.getElementById("resume").value;
            const job_description = document.getElementById("job_description").value;

            document.getElementById("output").innerText = "Generating...";
            document.getElementById("flagged").innerText = "";

            const response = await fetch("/generate", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ resume, job_description })
            });

            const data = await response.json();
            document.getElementById("output").innerText = data.message || data.error;
            document.getElementById("flagged").innerText = "Flagged claims:\n" + (data.flagged || "");
        }
    </script>
</body>
</html>
